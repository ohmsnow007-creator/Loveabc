<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💖 ง้อออมสิน 💖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d4fc79 100%);
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
    font-family: 'Arial', sans-serif; overflow: hidden; user-select: none; touch-action: manipulation;
    padding: 16px;
}
.card {
    background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
    border-radius: 30px; padding: 36px 20px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center;
    max-width: 420px; width: 100%; position: relative;
}
.face { font-size: 64px; margin-bottom: 6px; }
h1 { color: #e74c6f; font-size: 26px; margin-bottom: 4px; }
h1 span { color: #00bcd4; }
.sub { color: #888; font-size: 15px; margin-bottom: 28px; }
.btn-area { position: relative; width: 100%; height: 120px; display: flex; justify-content: center; align-items: center; }
.btn-yes {
    background: linear-gradient(135deg, #ff6b8a, #ff8e9e); color: white; border: none;
    padding: 16px 44px; border-radius: 50px; font-size: 20px; cursor: pointer;
    box-shadow: 0 5px 25px rgba(255,107,138,0.4);
    white-space: nowrap; z-index: 2;
}
.btn-yes:active { transform: scale(0.95); }
.btn-no {
    background: #f0f0f0; color: #aaa; border: 2px solid #ddd;
    padding: 14px 36px; border-radius: 50px; font-size: 18px; cursor: pointer;
    white-space: nowrap; z-index: 1; position: absolute;
    transition: left 0.12s ease, top 0.12s ease;
    touch-action: manipulation;
}
.result { display: none; animation: popIn 0.6s ease; }
.result .big { font-size: 80px; }
.result h2 { color: #e74c6f; font-size: 30px; margin: 12px 0; }
.result h2 span { color: #00bcd4; }
.result p { color: #666; font-size: 17px; line-height: 1.6; }
@keyframes popIn {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    70% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 999; }
.heart-fly { position: absolute; font-size: 20px; animation: flyUp 3s linear forwards; opacity: 0.7; }
@keyframes flyUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}
@media (max-width: 400px) {
    .card { padding: 24px 12px; }
    h1 { font-size: 20px; }
    .btn-yes { padding: 14px 28px; font-size: 16px; }
    .btn-no { padding: 12px 22px; font-size: 14px; }
}
</style>
</head>
<body>
<div class="hearts" id="hearts"></div>
<div class="card">
    <div class="face">🥺💙</div>
    <h1>💖 ดีกันนะ <span>ออมสิน</span> 💖</h1>
    <div class="sub">🩵 ขอบคุณที่ยังรักกันนะคะ 🩵</div>
    <div class="btn-area" id="btnArea">
        <button class="btn-yes" id="btnYes" onclick="showResult()">💕 ดีกันเลย!</button>
        <button class="btn-no" id="btnNo">😤 ไม่ดีกว่า</button>
    </div>
    <div class="result" id="result">
        <div class="big">🥰💕🩵💖</div>
        <h2>ดีกันแล้วน๊า <span>ออมสิน</span> 🥰</h2>
        <p>🩵 ขอบคุณที่ให้โอกาสกันเสมอ<br>รักนะ 💖</p>
    </div>
</div>
<script>
(function() {
    const btn = document.getElementById('btnNo');
    const area = document.getElementById('btnArea');
    let first = true;
    function moveNo() {
    const bw = btn.offsetWidth;
    const bh = btn.offsetHeight;
    const aw = area.offsetWidth;
    const ah = area.offsetHeight;
    const margin = 8;
    const spots = [
        { x: margin, y: margin },
        { x: margin, y: ah - bh - margin },
        { x: aw - bw - margin, y: margin },
        { x: aw - bw - margin, y: ah - bh - margin },
    ];
    const lastX = btn.style.left ? parseInt(btn.style.left) : -999;
    const lastY = btn.style.top ? parseInt(btn.style.top) : -999;
    const others = spots.filter(s => Math.abs(s.x - lastX) > 5 || Math.abs(s.y - lastY) > 5);
    const pick = others[Math.floor(Math.random() * others.length)];
    btn.style.left = pick.x + 'px';
    btn.style.top = pick.y + 'px';
    }
    btn.addEventListener('mouseover', moveNo);
    btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        moveNo();
    }, { passive: false });
    window.addEventListener('resize', function() {
        if (!first) moveNo();
    });
    window.onload = function() {
        setTimeout(function() {
            const areaRect = area.getBoundingClientRect();
            const yesBtn = document.getElementById('btnYes');
            const yesRect = yesBtn.getBoundingClientRect();
            btn.style.left = (yesRect.left - areaRect.left + yesBtn.offsetWidth + 15) + 'px';
            btn.style.top = ((area.offsetHeight - btn.offsetHeight) / 2) + 'px';
            first = false;
        }, 50);
    };
})();
function showResult() {
    document.getElementById('btnNo').style.display = 'none';
    document.getElementById('btnYes').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.querySelector('.face').innerHTML = '🥰🩵💙';
    const c = document.getElementById('hearts');
    const e = ['💖','🩵','💙','❤️','🥰','💗','💓','✨','🌸','💕'];
    for (let i = 0; i < 40; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'heart-fly';
            el.textContent = e[Math.floor(Math.random()*e.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = (14 + Math.random() * 26) + 'px';
            el.style.animationDuration = (2 + Math.random() * 3) + 's';
            c.appendChild(el);
            setTimeout(() => el.remove(), 6000);
        }, i * 80);
    }
}
</script>
</body>
</html>
