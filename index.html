<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💖 ดีกันนะออมสิน 💖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d4fc79 100%);
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    font-family: 'Arial', sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none;
    touch-action: none; position: relative;
    padding: 16px;
}
.card {
    background: rgba(255,255,255,0.93); backdrop-filter: blur(10px);
    border-radius: 30px; padding: 32px 16px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12); text-align: center;
    max-width: 400px; width: 100%; position: relative; z-index: 2;
}
.face { font-size: 56px; margin-bottom: 4px; }
h1 { color: #e74c6f; font-size: 24px; }
h1 span { color: #00bcd4; }
.sub { color: #777; font-size: 14px; margin: 4px 0 20px; }
.btn-wrap { position: relative; height: 80px; margin: 0 auto; }
.btn-yes {
    background: linear-gradient(135deg, #ff6b8a, #ff8e9e); color: white; border: none;
    padding: 14px 36px; border-radius: 50px; font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,138,0.35);
    white-space: nowrap; position: absolute; left: 50%; transform: translateX(-50%);
    top: 50%; transform: translate(-50%,-50%); z-index: 2;
}
.btn-yes:active { transform: translate(-50%,-50%) scale(0.95); }
.btn-no {
    background: #f0f0f0; color: #999; border: 2px solid #ddd;
    padding: 12px 30px; border-radius: 50px; font-size: 16px; cursor: pointer;
    white-space: nowrap; z-index: 3; position: fixed;
    touch-action: none; transition: none;
}
.result { display: none; animation: popIn 0.6s ease; padding: 10px 0; }
.result .big { font-size: 64px; }
.result h2 { color: #e74c6f; font-size: 26px; margin: 10px 0; }
.result h2 span { color: #00bcd4; }
.result p { color: #666; font-size: 16px; line-height: 1.5; }
@keyframes popIn {
    0% { transform: scale(0) rotate(-8deg); opacity: 0; }
    70% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
.heart-fly { position: absolute; font-size: 18px; animation: flyUp 3s linear forwards; opacity: 0.6; }
@keyframes flyUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
<div class="heart-bg" id="hearts"></div>
<div class="card">
    <div class="face">🥺💙</div>
    <h1>💖 ดีกันนะ <span>ออมสิน</span> 💖</h1>
    <div class="sub">🩵 ขอบคุณที่ยังรักกันนะคะ 🩵</div>
    <div class="btn-wrap" id="btnWrap">
        <button class="btn-yes" id="btnYes" onclick="done()">💕 ดีกันเลย!</button>
        <button class="btn-no" id="btnNo">😤 ไม่ดีกว่า</button>
    </div>
    <div class="result" id="result">
        <div class="big">🥰💕🩵💖</div>
        <h2>ดีกันแล้วน๊า <span>ออมสิน</span> 🥰</h2>
        <p>🩵 ขอบคุณที่ให้โอกาสกันเสมอ<br>รักนะ 💖</p>
    </div>
</div>
<script>
(function() {
    const noBtn = document.getElementById('btnNo');
    const yesBtn = document.getElementById('btnYes');
    let first = true;

    function getBtnRect(el) {
        return el.getBoundingClientRect();
    }

    function overlap(r1, r2) {
        return !(r1.right <= r2.left || r1.left >= r2.right || r1.bottom <= r2.top || r1.top >= r2.bottom);
    }

    function findPos() {
        const bw = noBtn.offsetWidth;
        const bh = noBtn.offsetHeight;
        const pad = 10;
        const maxX = window.innerWidth - bw - pad;
        const maxY = window.innerHeight - bh - pad;
        if (maxX < pad || maxY < pad) return { x: pad, y: pad };

        for (let tries = 0; tries < 100; tries++) {
            const x = pad + Math.random() * (maxX - pad);
            const y = pad + Math.random() * (maxY - pad);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // force layout
            const nr = noBtn.getBoundingClientRect();
            const yr = yesBtn.getBoundingClientRect();

            if (!overlap(nr, yr)) {
                return { x, y };
            }
        }
        // fallback: top-left corner
        return { x: pad, y: pad };
    }

    function moveNo() {
        const pos = findPos();
        noBtn.style.left = pos.x + 'px';
        noBtn.style.top = pos.y + 'px';
    }

    function resetNo() {
        const wrap = document.getElementById('btnWrap');
        const wr = wrap.getBoundingClientRect();
        const yesRect = yesBtn.getBoundingClientRect();
        // place no button to the right of yes button
        const x = yesRect.right - wr.left + 10;
        const y = (wr.height - noBtn.offsetHeight) / 2;
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
        noBtn.style.position = 'absolute';
    }

    // events
    noBtn.addEventListener('mouseenter', function(e) {
        if (!first) moveNo();
    });
    noBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (!first) moveNo();
    }, { passive: false });
    window.addEventListener('resize', function() {
        if (!first) moveNo();
    });

    // initial position
    window.onload = function() {
        setTimeout(function() {
            noBtn.style.position = 'fixed';
            first = false;
            moveNo();
        }, 100);
    };
})();

function done() {
    document.getElementById('btnNo').style.display = 'none';
    document.getElementById('btnYes').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.querySelector('.face').innerHTML = '🥰🩵💙';
    const c = document.getElementById('hearts');
    const e = ['💖','🩵','💙','❤️','🥰','💗','💓','✨','🌸','💕'];
    for (let i = 0; i < 40; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'heart-fly';
            el.textContent = e[Math.floor(Math.random()*e.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = (12 + Math.random() * 24) + 'px';
            el.style.animationDuration = (2 + Math.random() * 3) + 's';
            c.appendChild(el);
            setTimeout(() => el.remove(), 6000);
        }, i * 80);
    }
}
</script>
</body>
</html>
